<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="568" viewBox="0 0 680 568">
  <defs>
    <style>
      .terminal-bg { fill: #1a1b26; }
      .titlebar { fill: #24283b; }
      .text { font-family: 'Menlo', 'Monaco', 'Courier New', monospace; font-size: 13px; }
      .prompt { fill: #7aa2f7; }
      .command { fill: #c0caf5; }
      .success { fill: #9ece6a; }
      .error { fill: #f7768e; }
      .dim { fill: #565f89; }
      .warning { fill: #e0af68; }
      .cyan { fill: #7dcfff; }
      .magenta { fill: #bb9af7; }
      .white { fill: #c0caf5; }
      .bold { font-weight: 700; }
      .green { fill: #9ece6a; }
      .yellow { fill: #e0af68; }
      .blue { fill: #7aa2f7; }
      .red { fill: #f7768e; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Window shadow -->
  <rect x="16" y="16" width="648" height="536" rx="12" fill="none" filter="url(#shadow)"/>

  <!-- Terminal background -->
  <rect x="16" y="16" width="648" height="536" rx="12" class="terminal-bg"/>

  <!-- Title bar -->
  <rect x="16" y="16" width="648" height="40" rx="12" class="titlebar"/>
  <rect x="16" y="44" width="648" height="12" class="titlebar"/>

  <!-- Traffic lights -->
  <circle cx="40" cy="36" r="7" fill="#ff5f57"/>
  <circle cx="62" cy="36" r="7" fill="#febc2e"/>
  <circle cx="84" cy="36" r="7" fill="#28c840"/>

  <!-- Title -->
  <text x="340" y="41" class="text dim" text-anchor="middle" font-size="12">LocalCode -- Self-Healing Agent</text>

  <!-- Content -->
  <g transform="translate(36, 76)">
    <text x="0" y="0" class="text prompt">$ </text>
    <text x="15.6" y="0" class="text command">localcode-cli</text>
    <text x="0" y="20" class="text white"></text>
    <text x="0" y="40" class="text cyan">  LocalCode v0.2.0</text>
    <text x="140.4" y="40" class="text dim">  --  Privacy-first AI code editor</text>
    <text x="0" y="60" class="text white"></text>
    <text x="0" y="80" class="text dim">You: </text>
    <text x="39.0" y="80" class="text white">create a python script that fetches bitcoin price and run it</text>
    <text x="0" y="100" class="text white"></text>
    <text x="0" y="120" class="text blue">  * </text>
    <text x="31.2" y="120" class="text dim">Thinking...</text>
    <text x="0" y="140" class="text magenta">  &gt; </text>
    <text x="31.2" y="140" class="text cyan">write_file</text>
    <text x="109.2" y="140" class="text dim">  bitcoin_price.py</text>
    <text x="0" y="160" class="text success">      + </text>
    <text x="62.4" y="160" class="text dim">Wrote 18 lines to bitcoin_price.py</text>
    <text x="0" y="180" class="text magenta">  &gt; </text>
    <text x="31.2" y="180" class="text cyan">run_command</text>
    <text x="117.0" y="180" class="text dim">  python3 bitcoin_price.py</text>
    <text x="0" y="200" class="text error">      X </text>
    <text x="62.4" y="200" class="text error">[ERROR exit_code=1]</text>
    <text x="0" y="220" class="text white">        </text>
    <text x="62.4" y="220" class="text error">ModuleNotFoundError: No module named &#x27;requests&#x27;</text>
    <text x="0" y="240" class="text white"></text>
    <text x="0" y="260" class="text blue">  * </text>
    <text x="31.2" y="260" class="text warning">Auto-fixing... (attempt 1/3)</text>
    <text x="0" y="280" class="text magenta">  &gt; </text>
    <text x="31.2" y="280" class="text cyan">run_command</text>
    <text x="117.0" y="280" class="text dim">  pip install requests</text>
    <text x="0" y="300" class="text success">      + </text>
    <text x="62.4" y="300" class="text dim">Successfully installed requests-2.31.0</text>
    <text x="0" y="320" class="text magenta">  &gt; </text>
    <text x="31.2" y="320" class="text cyan">run_command</text>
    <text x="117.0" y="320" class="text dim">  python3 bitcoin_price.py</text>
    <text x="0" y="340" class="text success">      + </text>
    <text x="62.4" y="340" class="text success">Bitcoin: $67,432.18 USD</text>
    <text x="0" y="360" class="text white"></text>
    <text x="0" y="380" class="text cyan">  Agent: </text>
    <text x="70.2" y="380" class="text white">Done! The script fetches the current Bitcoin price</text>
    <text x="0" y="400" class="text white">  </text>
    <text x="15.6" y="400" class="text white">from CoinGecko API. Current price: $67,432.18 USD</text>
  </g>
</svg>