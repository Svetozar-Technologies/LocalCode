<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="548" viewBox="0 0 700 548">
  <defs>
    <style>
      .terminal-bg { fill: #1a1b26; }
      .titlebar { fill: #24283b; }
      .text { font-family: 'Menlo', 'Monaco', 'Courier New', monospace; font-size: 13px; }
      .prompt { fill: #7aa2f7; }
      .command { fill: #c0caf5; }
      .success { fill: #9ece6a; }
      .error { fill: #f7768e; }
      .dim { fill: #565f89; }
      .warning { fill: #e0af68; }
      .cyan { fill: #7dcfff; }
      .magenta { fill: #bb9af7; }
      .white { fill: #c0caf5; }
      .bold { font-weight: 700; }
      .green { fill: #9ece6a; }
      .yellow { fill: #e0af68; }
      .blue { fill: #7aa2f7; }
      .red { fill: #f7768e; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Window shadow -->
  <rect x="16" y="16" width="668" height="516" rx="12" fill="none" filter="url(#shadow)"/>

  <!-- Terminal background -->
  <rect x="16" y="16" width="668" height="516" rx="12" class="terminal-bg"/>

  <!-- Title bar -->
  <rect x="16" y="16" width="668" height="40" rx="12" class="titlebar"/>
  <rect x="16" y="44" width="668" height="12" class="titlebar"/>

  <!-- Traffic lights -->
  <circle cx="40" cy="36" r="7" fill="#ff5f57"/>
  <circle cx="62" cy="36" r="7" fill="#febc2e"/>
  <circle cx="84" cy="36" r="7" fill="#28c840"/>

  <!-- Title -->
  <text x="350" y="41" class="text dim" text-anchor="middle" font-size="12">LocalCode -- Quick Start</text>

  <!-- Content -->
  <g transform="translate(36, 76)">
    <text x="0" y="0" class="text prompt">$ </text>
    <text x="15.6" y="0" class="text command">git clone https://github.com/Svetozar-Technologies/LocalCode.git</text>
    <text x="0" y="20" class="text dim">  Cloning into &#x27;LocalCode&#x27;...</text>
    <text x="0" y="40" class="text prompt">$ </text>
    <text x="15.6" y="40" class="text command">cd LocalCode &amp;&amp; cargo build --release</text>
    <text x="0" y="60" class="text white">  </text>
    <text x="15.6" y="60" class="text dim">Compiling localcode-cli v0.2.0</text>
    <text x="0" y="80" class="text white">  </text>
    <text x="15.6" y="80" class="text success">Finished `release` in 45s</text>
    <text x="0" y="100" class="text prompt">$ </text>
    <text x="15.6" y="100" class="text command">./target/release/localcode-cli</text>
    <text x="0" y="120" class="text white"></text>
    <text x="0" y="140" class="text white"></text>
    <text x="0" y="160" class="text cyan">  +==================================================+</text>
    <text x="0" y="180" class="text cyan">  |</text>
    <text x="23.4" y="180" class="text white">         LocalCode v0.2.0                       </text>
    <text x="397.79999999999995" y="180" class="text cyan">|</text>
    <text x="0" y="200" class="text cyan">  |</text>
    <text x="23.4" y="200" class="text dim">     Privacy-first AI code editor                </text>
    <text x="405.59999999999997" y="200" class="text cyan">|</text>
    <text x="0" y="220" class="text cyan">  +==================================================+</text>
    <text x="0" y="240" class="text white"></text>
    <text x="0" y="260" class="text white">  </text>
    <text x="15.6" y="260" class="text yellow">/model ollama:llama3</text>
    <text x="171.6" y="260" class="text dim">     &lt;- Use local model (free, private)</text>
    <text x="0" y="280" class="text white">  </text>
    <text x="15.6" y="280" class="text yellow">/model openai:gpt-4o</text>
    <text x="171.6" y="280" class="text dim">     &lt;- Use OpenAI API</text>
    <text x="0" y="300" class="text white">  </text>
    <text x="15.6" y="300" class="text yellow">/model anthropic:claude</text>
    <text x="195.0" y="300" class="text dim">  &lt;- Use Anthropic API</text>
    <text x="0" y="320" class="text white"></text>
    <text x="0" y="340" class="text dim">  Commands: </text>
    <text x="93.6" y="340" class="text cyan">/help</text>
    <text x="132.6" y="340" class="text cyan"> /sessions</text>
    <text x="210.6" y="340" class="text cyan"> /recall</text>
    <text x="273.0" y="340" class="text cyan"> /memory</text>
    <text x="335.4" y="340" class="text cyan"> /commit</text>
    <text x="0" y="360" class="text white"></text>
    <text x="0" y="380" class="text dim">You: </text>
    <text x="39.0" y="380" class="text white">_</text>
  </g>
</svg>