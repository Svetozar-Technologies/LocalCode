name: Release Desktop (macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: LocalCode-darwin-arm64
            os: macos-latest
          - target: x86_64-apple-darwin
            name: LocalCode-darwin-x64
            os: macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Build desktop app
        working-directory: apps/desktop
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-dmg
          path: apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload .app.tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-app
          path: apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.dmg
            *.app.tar.gz
