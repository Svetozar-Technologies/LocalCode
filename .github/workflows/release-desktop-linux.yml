name: Release Desktop (Linux)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Build desktop app
        working-directory: apps/desktop
        run: cargo tauri build

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: localcode-linux-deb
          path: apps/desktop/src-tauri/target/release/bundle/deb/*.deb

      - name: Upload .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: localcode-linux-appimage
          path: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.deb
            *.AppImage
